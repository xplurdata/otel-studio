name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check JS syntax
        run: |
          find src -name "*.js" -print0 | xargs -0 -n1 node --check

  docker-build:
    runs-on: ubuntu-latest
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t otel-studio:ci .

      # Scans the built image for known OS-package and library vulnerabilities
      # (CVEs). Blocks the workflow on CRITICAL or HIGH severity findings -
      # this is what gives anyone pulling the public image confidence it's
      # actually been checked, not just built and shipped.
      - name: Security scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'otel-studio:ci'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Smoke-test container boots
        run: |
          docker run -d --name ci-test -p 3002:3002 -e ADMIN_PASS=ci-test otel-studio:ci
          sleep 5
          docker logs ci-test
          curl -sf http://localhost:3002/ -o /dev/null || (docker logs ci-test && exit 1)
          docker stop ci-test

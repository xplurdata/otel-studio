name: Image Security Scan

on:
  # Runs weekly so the badge reflects newly-discovered CVEs too, not just
  # the state at push time - base image vulnerabilities get reported after
  # the fact all the time.
  schedule:
    - cron: '0 6 * * 1'   # every Monday 06:00 UTC
  workflow_dispatch:        # allows manually triggering a re-scan any time
  push:
    branches: [main]
    paths:
      - '.github/workflows/security-scan.yml'

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      # No checkout, no Dockerfile, no source code needed - this scans the
      # image layers already published to GHCR, which is all a vulnerability
      # scan actually needs. This is why this workflow can safely live in the
      # public docs-only repo even though the app source doesn't.
      - name: Pull latest published image
        run: docker pull ghcr.io/xplurdata/otel-studio:latest

      - name: Security scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/xplurdata/otel-studio:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

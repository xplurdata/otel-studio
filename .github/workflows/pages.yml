name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble Pages output from site/
        run: |
          mkdir -p _site
          cp -r site/. _site/
          cp CNAME _site/CNAME
          # .nojekyll disables GitHub's default Jekyll processing pass,
          # which has a history of mishandling .svg MIME types - plain
          # static serving is what this site actually needs.
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4

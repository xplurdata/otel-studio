name: Feature Request
description: Suggest a scenario, integration, or capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to test or simulate that OTel Studio doesn't currently support?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: A new scenario topology, a new stack preset, a new advanced control, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you're currently using instead.
    validations:
      required: false

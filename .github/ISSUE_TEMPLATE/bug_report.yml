name: Bug Report
description: Report something not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. This repo hosts the public site and docs for OTel Studio — if your bug is about the running app/container itself (not the website), please still file it here; this is the project's main public home.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include your `docker run` command if relevant.
      placeholder: |
        1. Run `docker run ...`
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Image version/tag
      placeholder: "e.g. ghcr.io/xplurdata/otel-studio:v1.0.0"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "`docker logs <container>` output, if applicable"
      render: shell
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Host OS
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: false
